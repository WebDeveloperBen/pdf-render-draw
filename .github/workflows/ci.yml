name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "apps/native/**"
      - "**.md"
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "apps/native/**"
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-validate:
    name: Web ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Typecheck
            command: pnpm run web:check
          - label: Unit tests
            command: pnpm run web:test --run
          - label: Integration tests
            command: pnpm run web:test:integration
            needs_testcontainers: true
          - label: Prod smoke
            command: pnpm run web:test:integration:prod
            needs_testcontainers: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.label }}
        run: ${{ matrix.command }}
        env:
          TESTCONTAINERS_RYUK_DISABLED: ${{ matrix.needs_testcontainers && 'true' || '' }}
