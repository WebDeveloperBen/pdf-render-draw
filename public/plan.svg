<svg width="1400" height="800" viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill:#050608; }
      .tenant { fill:none; stroke:#3b82f6; stroke-width:2; rx:20; ry:20; }
      .app { fill:none; stroke:#38bdf8; stroke-width:2; stroke-dasharray:6 6; rx:18; ry:18; }
      .panel { fill:#020617; stroke:#1f2937; stroke-width:2; rx:18; ry:18; }
      .db { fill:#020617; stroke:#fbbf24; stroke-width:2; rx:14; ry:14; }
      .label { fill:#e5e7eb; font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif; font-size:14px; }
      .title { fill:#f9fafb; font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif; font-size:16px; font-weight:600; }
      .small { fill:#9ca3af; font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif; font-size:12px; }
      .circleIcon { fill:#0ea5e9; stroke:#38bdf8; stroke-width:2; }
      .circleIconDark { fill:#020617; stroke:#38bdf8; stroke-width:2; }
      .line { stroke:#e5e7eb; stroke-width:1.8; fill:none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#e5e7eb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="800" class="bg"/>

  <!-- Tenant boundary (Cloudflare platform) -->
  <rect x="70" y="90" width="1260" height="620" class="tenant"/>
  <text x="90" y="120" class="title">Cloudflare Edge Platform</text>
  <text x="90" y="142" class="small">Workers · Queues · R2 · KV · Hyperdrive</text>

  <!-- Application boundary -->
  <rect x="200" y="180" width="1030" height="480" class="app"/>
  <text x="215" y="210" class="title">Job Discovery &amp; Recommendation App</text>

  <!-- Clients (top left / top right) -->
  <circle cx="230" cy="80" r="22" class="circleIcon"/>
  <text x="260" y="86" class="label">Candidate Clients</text>

  <circle cx="1170" cy="80" r="22" class="circleIcon"/>
  <text x="1200" y="86" class="label">Employer Clients</text>

  <!-- GitHub Actions (left middle) -->
  <circle cx="120" cy="400" r="30" class="circleIconDark"/>
  <text x="108" y="405" class="label">GH</text>
  <text x="80" y="445" class="small">GitHub Actions</text>

  <!-- Central runtime panel -->
  <rect x="330" y="250" width="420" height="310" class="panel"/>
  <text x="350" y="280" class="title">Cloudflare Runtime</text>
  <text x="350" y="308" class="label">API Worker Gateway</text>
  <text x="350" y="332" class="label">Auth Worker (Better Auth)</text>
  <text x="350" y="356" class="label">Job &amp; Recommendation Workers</text>
  <text x="350" y="380" class="label">Cron Scheduled Workers</text>
  <text x="350" y="412" class="small">Uses KV for config, R2 for raw blobs</text>
  <text x="350" y="434" class="small">Publishes to Cloudflare Queues</text>

  <!-- Messaging mini panel inside runtime -->
  <rect x="360" y="450" width="360" height="90" class="panel"/>
  <text x="375" y="475" class="label">Messaging (Queues)</text>
  <text x="390" y="500" class="small">jobs_ingest · jobs_transform · jobs_feature · user_events</text>

  <!-- Neon / database block -->
  <rect x="800" y="260" width="380" height="200" class="db"/>
  <text x="820" y="288" class="title">Neon Postgres + pgvector</text>
  <text x="820" y="314" class="label">Accessed via Hyperdrive</text>

  <text x="830" y="340" class="small">bronze: job_raw</text>
  <text x="830" y="360" class="small">silver: job_normalized</text>
  <text x="830" y="380" class="small">gold: features &amp; embeddings</text>
  <text x="830" y="400" class="small">auth: users &amp; sessions</text>

  <!-- LLM provider block -->
  <rect x="880" y="490" width="260" height="90" class="panel"/>
  <text x="900" y="515" class="title">LLM Provider</text>
  <text x="900" y="540" class="small">Embeddings · Rerank · Explanations</text>

  <!-- Labels for KV / R2 just above runtime -->
  <rect x="330" y="205" width="220" height="30" class="panel"/>
  <text x="345" y="225" class="small">KV Config / Feature Flags</text>
  <rect x="560" y="205" width="190" height="30" class="panel"/>
  <text x="575" y="225" class="small">R2 Raw Blobs / Assets</text>

  <!-- Hyperdrive small tag near Neon -->
  <rect x="800" y="220" width="160" height="26" class="panel"/>
  <text x="812" y="238" class="small">Hyperdrive Postgres Proxy</text>

  <!-- Connections -->

  <!-- Clients to runtime -->
  <line x1="230" y1="102" x2="410" y2="250" class="line" marker-end="url(#arrow)"/>
  <line x1="1170" y1="102" x2="680" y2="250" class="line" marker-end="url(#arrow)"/>

  <!-- Web/API path hint -->
  <text x="460" y="245" class="small">HTTPS API</text>

  <!-- GitHub to runtime -->
  <line x1="150" y1="400" x2="330" y2="360" class="line" marker-end="url(#arrow)"/>
  <text x="165" y="380" class="small">CI / CD deploy</text>

  <!-- Runtime to queues (conceptual) -->
  <line x1="510" y1="430" x2="510" y2="450" class="line" marker-end="url(#arrow)"/>

  <!-- Runtime to Neon via Hyperdrive -->
  <line x1="750" y1="360" x2="800" y2="360" class="line" marker-end="url(#arrow)"/>
  <text x="755" y="350" class="small">SQL via Hyperdrive</text>

  <!-- Runtime to LLM -->
  <line x1="640" y1="470" x2="880" y2="520" class="line" marker-end="url(#arrow)"/>

  <!-- Neon to LLM label (for embedding jobs) -->
  <line x1="980" y1="460" x2="980" y2="490" class="line" marker-end="url(#arrow)"/>
  <text x="990" y="476" class="small">batch features / embeddings</text>

</svg>
