# PDF Annotator - Cloudflare Pages
name = "pdf-annotator"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".output/public"

# R2 bucket binding
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "pdf-annotator-assets"

# Hyperdrive binding for PostgreSQL connection pooling
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "" # Set via: wrangler hyperdrive create pdf-annotator-db --connection-string="..."

[vars]
ENVIRONMENT = "production"

# Preview deployments (PR branches)
[env.preview]
[env.preview.vars]
ENVIRONMENT = "preview"
